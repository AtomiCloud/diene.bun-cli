[test]
root = "tests/unit"
coverageReporter = ["text", "lcov"]
coverageDir = "coverage/unit"
coverageSkipTestFiles = true
# Unit coverage measures the domain (100% goal) + config; adapters are covered by their own
# tiers (data -> integration, api journeys -> SIT) and helper fakes are not sources.
coveragePathIgnorePatterns = ["tests/**", "src/adapters/**"]
