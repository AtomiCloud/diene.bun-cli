name: ⚡ Reusable Smoke
on:
  workflow_call:
    inputs:
      binary:
        description: Binary filename under dist/bin/ to smoke-test
        required: true
        type: string
      runs_on:
        description: JSON array of runner labels for this target
        required: true
        type: string
jobs:
  smoke:
    name: Smoke
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    steps:
      # Read-only job (repo content + downloaded artifact), so no persisted git token is needed.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download compiled binaries
        uses: actions/download-artifact@v7
        with:
          name: cli-binaries
          path: dist/bin
      # Run the standalone binary directly. `binary` is routed through env: (not interpolated into
      # the run script text) so a caller input can never be expanded into shell source.
      - name: Smoke
        env:
          BINARY: ${{ inputs.binary }}
        run: ./scripts/release/smoke.sh "dist/bin/${BINARY}"
