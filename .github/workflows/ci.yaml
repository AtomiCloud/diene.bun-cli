name: CI
on:
  push: null
jobs:
  precommit:
    name: Pre-Commit
    uses: ./.github/workflows/⚡reusable-precommit.yaml
    secrets: inherit
  unit:
    name: Unit Tests
    uses: ./.github/workflows/⚡reusable-test.yaml
    secrets: inherit
    with:
      mode: unit
  int:
    name: Integration Tests
    uses: ./.github/workflows/⚡reusable-test.yaml
    secrets: inherit
    with:
      mode: int
  build:
    name: Build Validation
    uses: ./.github/workflows/⚡reusable-build.yaml
    secrets: inherit
  docker:
    name: Docker Image
    uses: ./.github/workflows/⚡reusable-docker.yaml
    secrets: inherit
    with:
      image_name: diene-bun-cli
      dockerfile: ./infra/Dockerfile
  compile:
    name: Compile Binaries
    uses: ./.github/workflows/⚡reusable-compile.yaml
    secrets: inherit
  sit:
    name: SIT
    needs: compile
    uses: ./.github/workflows/⚡reusable-sit.yaml
    secrets: inherit
  smoke:
    name: Smoke ${{ matrix.target }}
    needs: compile
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-baseline
            binary: bun-cli-linux-x64-baseline
            runs_on: '["ubuntu-22.04"]'
          - target: linux-arm64
            binary: bun-cli-linux-arm64
            runs_on: '["ubuntu-24.04-arm"]'
          - target: darwin-arm64
            binary: bun-cli-darwin-arm64
            runs_on: '["macos-14"]'
    uses: ./.github/workflows/⚡reusable-smoke.yaml
    secrets: inherit
    with:
      binary: ${{ matrix.binary }}
      runs_on: ${{ matrix.runs_on }}
